<!DOCTYPE html>
<html>
<head>
    <title>Static SW IDE</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1e1e1e; color: white; }
        textarea { width: 100%; height: 300px; background: #2d2d2d; color: #9cdcfe; border: 1px solid #444; padding: 10px; font-family: monospace; }
        button { padding: 10px 20px; background: #007acc; color: white; border: none; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 10px; color: #4ec9b0; }
        .preview { margin-top: 20px; padding: 10px; border: 1px solid #444; background: #333; }
    </style>
</head>
<body>
    <h1>Mini SW IDE</h1>
    <p>Write your fetch handler below. It must return a <code>Response</code>.</p>
    
    <textarea id="code">
// Intercept /api/hello
if (event.request.url.endsWith('/api/hello')) {
  return new Response(JSON.stringify({ message: "Hello from the User Worker!" }), {
    headers: { 'Content-Type': 'application/json' }
  });
}

return new Response("Fallback response for other /api/ calls");</textarea>

    <br>
    <button onclick="saveAndRun()">Save & Apply Logic</button>
    <div id="status">Ready.</div>

    <hr>
    <h3>Test Your Worker</h3>
    <button onclick="testFetch()">Fetch /api/hello</button>
    <div id="output" class="preview">Response will appear here...</div>

    <script>
        const DB_NAME = 'IDE_Storage';
        const STORE_NAME = 'scripts';

        // Initialize DB and Service Worker
        async function init() {
            if ('serviceWorker' in navigator) {
                await navigator.serviceWorker.register('sw.js');
                document.getElementById('status').innerText = "Service Worker Registered.";
            }
        }

        async function saveAndRun() {
            const code = document.getElementById('code').value;
            
            // Save to IndexedDB
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
            request.onsuccess = (e) => {
                const db = e.target.result;
                const transaction = db.transaction(STORE_NAME, 'readwrite');
                transaction.objectStore(STORE_NAME).put(code, 'user-sw-logic');
                transaction.oncomplete = () => {
                    document.getElementById('status').innerText = "Logic Updated! (Refreshing Worker...)";
                    // Force refresh by reloading the page or sending a message
                    location.reload(); 
                };
            };
        }

        async function testFetch() {
            const out = document.getElementById('output');
            out.innerText = "Fetching...";
            try {
                const res = await fetch('/api/hello');
                const text = await res.text();
                out.innerText = text;
            } catch (e) {
                out.innerText = "Fetch failed. Is the SW running?";
            }
        }

        init();
    </script>
</body>
</html>

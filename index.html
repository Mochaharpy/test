<!DOCTYPE html>
<html>
<head>
    <title>SW test</title>
    <style>
        body { font-family: monospace; background: #121212; color: #aaa; padding: 20px; }
        textarea { 
            width: 100%; height: 350px; 
            background: #1e1e1e; color: #d4d4d4; 
            border: 1px solid #333; padding: 10px; font-size: 14px;
        }
        button { background: #3c3c3c; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        button:hover { background: #505050; }
        #log { margin-top: 20px; color: #9cdcfe; white-space: pre-wrap; border-top: 1px solid #333; padding-top: 10px; }
    </style>
</head>
<body>
    <h2>Service Worker Sandbox</h2>
    <p>Write a full Service Worker script below:</p>
    
    <textarea id="editor">
self.addEventListener('install', (event) => {
  console.log('User SW: Installing...');
});

self.addEventListener('fetch', (event) => {
  if (event.request.url.includes('test-api')) {
    event.respondWith(
      new Response('{"status": "Real SW Interception!"}', {
        headers: { 'Content-Type': 'application/json' }
      })
    );
  }
});</textarea>

    <br>
    <button onclick="deployWorker()">Deploy & Register</button>
    <button onclick="testRequest()">Test Fetch</button>
    
    <div id="log">Logs will appear here...</div>

    <script>
        let registration = null;

        async function deployWorker() {
            const code = document.getElementById('editor').value;
            
            // 1. Create a Blob from the user's string code
            const blob = new Blob([code], { type: 'application/javascript' });
            const blobUrl = URL.createObjectURL(blob);

            // 2. Register the "Master" worker if not already registered
            if (!registration) {
                registration = await navigator.serviceWorker.register('sw.js');
                // Wait for it to be ready
                await navigator.serviceWorker.ready;
            }

            // 3. Send the Blob URL to the Master Worker
            // This is the "Magic" part: importScripts can take a Blob URL!
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'INSTALL_USER_CODE',
                    url: blobUrl
                });
                log("Code sent to Master Worker. Try fetching now.");
            } else {
                log("Worker not controlled yet. Refreshing...");
                location.reload();
            }
        }

        async function testRequest() {
            log("Fetching /test-api...");
            try {
                const res = await fetch('/test-api');
                const data = await res.text();
                log("Result: " + data);
            } catch (e) {
                log("Error: " + e);
            }
        }

        function log(msg) {
            document.getElementById('log').textContent += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
        }

        // Register on load
        window.onload = () => navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
